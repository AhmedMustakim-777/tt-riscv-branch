project:
  title:        "rv32i RISC-V Register File"
  author:       "Ahmed Mustakim — UCF EEE-5390C"
  discord:      ""
  description:  "Full 32x32-bit RISC-V register file with 4 write ports and 2 read ports. Extracted from a complete rv32imsu RISC-V SoC implemented in Synopsys DC Shell and ICC2 on sky130A 130nm PDK at UCF EEE-5390C. Companion to the rv32i ALU tile."
  language:     "Verilog"
  clock_hz:     50000000
  tiles:        "1x2"
  top_module:   "tt_um_riscv_regfile"
  source_files:
    - "tt_um_riscv_regfile.v"
    - "riscv_regfile.v"
pinout:
  ui[0]: "reg_idx[0] or byte_sel[0]"
  ui[1]: "reg_idx[1] or byte_sel[1]"
  ui[2]: "reg_idx[2]"
  ui[3]: "reg_idx[3]"
  ui[4]: "reg_idx[4]"
  ui[5]: "read_mode (1=read 0=write)"
  ui[6]: "phase[0]"
  ui[7]: "phase[1]"
  uo[0]: "result_byte[0]"
  uo[1]: "result_byte[1]"
  uo[2]: "result_byte[2]"
  uo[3]: "result_byte[3]"
  uo[4]: "result_byte[4]"
  uo[5]: "result_byte[5]"
  uo[6]: "result_byte[6]"
  uo[7]: "result_byte[7]"
  uio[0]: "data_byte[0]"
  uio[1]: "data_byte[1]"
  uio[2]: "data_byte[2]"
  uio[3]: "data_byte[3]"
  uio[4]: "data_byte[4]"
  uio[5]: "data_byte[5]"
  uio[6]: "data_byte[6]"
  uio[7]: "data_byte[7]"
yaml_version: 6
